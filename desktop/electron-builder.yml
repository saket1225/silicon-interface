# electron-builder config for the Silicon Interface desktop app.
# Run from desktop/ after the root `desktop:build` script has produced
# ../.next/standalone (with public/ and .next/static assembled inside).
appId: ai.45d.silicon-interface
productName: Silicon Interface
directories:
  output: dist
  buildResources: build

# Only the tiny Electron shell goes in the asar; the Next standalone server
# (with its bundled node_modules) ships as plain files under resources/ so
# utilityProcess can fork it directly.
files:
  - main.js
  - build/icon.png
  - package.json
extraResources:
  - from: ../.next/standalone-desktop
    to: standalone
    filter:
      - "**/*"
  # electron-builder hard-skips a fileset's root node_modules (fileMatcher
  # createFilter), so the flattened modules ship as their own fileset.
  - from: ../.next/standalone-desktop/node_modules
    to: standalone/node_modules
    filter:
      - "**/*"

npmRebuild: false

win:
  icon: build/icon.png
  target:
    - target: nsis
      arch: [x64]
    - target: zip
      arch: [x64]
nsis:
  oneClick: true
  deleteAppDataOnUninstall: false

linux:
  icon: build/icon.png
  category: Network
  maintainer: team@45d.ai
  synopsis: Desktop client for Silicon Interface
  target:
    - target: AppImage
      arch: [x64, arm64]
    - target: deb
      arch: [x64, arm64]

# dir-only, unsigned — local smoke-testing, not distribution.
mac:
  identity: null
  target:
    - target: dir
      arch: [arm64]
